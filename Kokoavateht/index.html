<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap - Esimerkkisivu</title>
    <meta name="description" content="Esimerkkisivu: responsiivinen navigaatio, kuvakaruselli, ruudukko, kortit, haitari ja taulukko (Bootstrap)." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="" crossorigin="anonymous">
    <style>
    
      :focus {
        outline: 3px solid #0d6efd66;
        outline-offset: 2px;
      }
      .skip-link {
        position: absolute;
        left: -999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      .skip-link:focus {
        left: 1rem;
        top: 1rem;
        width: auto;
        height: auto;
        padding: .5rem .75rem;
        background: #fff;
        z-index: 1030;
        box-shadow: 0 0 0 .2rem rgba(13,110,253,.25);
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Siirry sisältöön</a>

    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary" aria-label="Päävalikko">
        <div class="container">
          <a class="navbar-brand" href="#">Esimerkki</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Vaihda navigaatio">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Etusivu</a></li>
              <li class="nav-item"><a class="nav-link" href="#carousel">Kuvakaruselli</a></li>
              <li class="nav-item"><a class="nav-link" href="#grid">Ruudukko</a></li>
              <li class="nav-item"><a class="nav-link" href="#cards">Kortit</a></li>
              <li class="nav-item"><a class="nav-link" href="#accordion">Haitari</a></li>
              <li class="nav-item"><a class="nav-link" href="#table">Taulukko</a></li>
            </ul>
            <form class="d-flex" role="search" aria-label="Hae sivustolta">
              <label for="searchInput" class="visually-hidden">Hae</label>
              <input id="searchInput" class="form-control me-2" type="search" placeholder="Hae" aria-label="Hae" />
              <button class="btn btn-light" type="submit">Hae</button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <main id="main-content" class="container my-4" role="main">
      <section id="carousel" class="mb-5" aria-labelledby="carouselHeading">
        <h2 id="carouselHeading" class="h3">Kuvakaruselli</h2>
        <div id="mainCarousel" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-indicators">
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
          </div>
          <div class="carousel-inner rounded-3 shadow-sm">
            <div class="carousel-item active">
              <img src="https://picsum.photos/id/11/1200/450" class="d-block w-100" alt="Maisemakuva: järvi ja metsää" />
              <div class="carousel-caption d-none d-md-block text-start">
                <h3>Maisema</h3>
                <p>Pieni esimerkkikuvaus maisemasta.</p>
              </div>
            </div>
            <div class="carousel-item">
              <img src="https://picsum.photos/id/391/1200/450" class="d-block w-100" alt="Kaupunkiyökuva" />
              <div class="carousel-caption d-none d-md-block">
                <h3>Kaupunki</h3>
                <p>Kaupungin yö valot.</p>
              </div>
            </div>
            <div class="carousel-item">
              <img src="https://picsum.photos/id/701/1200/450" class="d-block w-100" alt="Luontokuva, kukkia" />
              <div class="carousel-caption d-none d-md-block text-end">
                <h3>Luonto</h3>
                <p>Kukkanäytös.</p>
              </div>
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev" aria-label="Edellinen">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Edellinen</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next" aria-label="Seuraava">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Seuraava</span>
          </button>
        </div>
      </section>
